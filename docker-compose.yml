services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: video_generate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  backend:
    build: ./backend
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/video_generate
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY:-sk-orx-EATWLx2onAWQfkJpRj5zOhluXYACY5hm}
      - LLM_API_URL=${LLM_API_URL:-http://10.190.0.214:8080/v1}
      - LLM_MODEL=${LLM_MODEL:-deepseek-v4-pro}
      - COMFYUI_URL=${COMFYUI_URL:-http://10.190.0.222:8188}
      - COSYVOICE_URL=${COSYVOICE_URL:-http://10.190.0.222:8000}
      - SD_API_URL=${SD_API_URL:-http://10.190.0.222:7860}
      - JWT_SECRET=${JWT_SECRET:-video-generate-jwt-secret}
      - UPLOAD_DIR=/data/uploads
      - OUTPUT_DIR=/data/output
    volumes:
      - uploads:/data/uploads
      - outputs:/data/output
      - /tmp/gradio:/tmp/gradio:ro
    ports:
      - "8001:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://10.190.0.222:8001/api/v1
    ports:
      - "3000:3000"

  celery_worker:
    build: ./backend
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/video_generate
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY:-sk-orx-EATWLx2onAWQfkJpRj5zOhluXYACY5hm}
      - LLM_API_URL=${LLM_API_URL:-http://10.190.0.214:8080/v1}
      - LLM_MODEL=${LLM_MODEL:-deepseek-v4-pro}
      - COMFYUI_URL=${COMFYUI_URL:-http://10.190.0.222:8188}
      - COSYVOICE_URL=${COSYVOICE_URL:-http://10.190.0.222:8000}
      - SD_API_URL=${SD_API_URL:-http://10.190.0.222:7860}
      - JWT_SECRET=${JWT_SECRET:-video-generate-jwt-secret}
      - UPLOAD_DIR=/data/uploads
      - OUTPUT_DIR=/data/output
    volumes:
      - uploads:/data/uploads
      - outputs:/data/output
      - /tmp/gradio:/tmp/gradio:ro
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1

  celery_beat:
    build: ./backend
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/video_generate
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY:-sk-orx-EATWLx2onAWQfkJpRj5zOhluXYACY5hm}
      - LLM_API_URL=${LLM_API_URL:-http://10.190.0.214:8080/v1}
      - LLM_MODEL=${LLM_MODEL:-deepseek-v4-pro}
      - COMFYUI_URL=${COMFYUI_URL:-http://10.190.0.222:8188}
      - COSYVOICE_URL=${COSYVOICE_URL:-http://10.190.0.222:8000}
      - SD_API_URL=${SD_API_URL:-http://10.190.0.222:7860}
      - JWT_SECRET=${JWT_SECRET:-video-generate-jwt-secret}
      - UPLOAD_DIR=/data/uploads
      - OUTPUT_DIR=/data/output
    volumes:
      - uploads:/data/uploads
      - outputs:/data/output
      - /tmp/gradio:/tmp/gradio:ro
    command: celery -A app.celery_app beat --loglevel=info

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"

volumes:
  pgdata:
  uploads:
  outputs:
  prometheus_data:
  grafana_data:
  minio_data:
