version: '3.8'

services:
  backend:
    build: ./backend
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/video_generate
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY:-sk-orx-EATWLx2onAWQfkJpRj5zOhluXYACY5hm}
      - LLM_API_URL=${LLM_API_URL:-http://10.190.0.214:8080/v1}
      - LLM_MODEL=${LLM_MODEL:-deepseek-v4-pro}
      - COMFYUI_URL=${COMFYUI_URL:-http://10.190.0.222:8188}
      - COSYVOICE_URL=${COSYVOICE_URL:-http://10.190.0.222:8000}
      - JWT_SECRET=${JWT_SECRET:-video-generate-jwt-secret}
      - UPLOAD_DIR=/data/uploads
      - OUTPUT_DIR=/data/output
    volumes:
      - uploads:/data/uploads
      - outputs:/data/output
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    restart: unless-stopped

  celery_worker:
    build: ./backend
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/video_generate
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY:-sk-orx-EATWLx2onAWQfkJpRj5zOhluXYACY5hm}
      - LLM_API_URL=${LLM_API_URL:-http://10.190.0.214:8080/v1}
      - COMFYUI_URL=${COMFYUI_URL:-http://10.190.0.222:8188}
      - COSYVOICE_URL=${COSYVOICE_URL:-http://10.190.0.222:8000}
      - UPLOAD_DIR=/data/uploads
      - OUTPUT_DIR=/data/output
    volumes:
      - uploads:/data/uploads
      - outputs:/data/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: video_generate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  outputs:
